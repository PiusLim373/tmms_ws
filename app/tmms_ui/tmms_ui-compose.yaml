services:
  tmms_ui:
    image: tmms_ui_image:0.1.0
    platform: linux/arm64
    container_name: tmms_ui
    # Same host networking as tmms_build so it can reach rosbridge (e.g. ws://localhost:9090)
    network_mode: host
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
